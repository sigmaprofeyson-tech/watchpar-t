<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Par-t</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; color: #e0e0e0; }
        body { background-color: #030005; overflow-x: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }

        .background { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #030005; overflow: hidden; }
        .contour-lines {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: 
                repeating-linear-gradient(-45deg, rgba(176, 38, 255, 0.05) 0px, rgba(176, 38, 255, 0.05) 1px, transparent 1px, transparent 15px),
                repeating-radial-gradient(circle at 50% 50%, rgba(176, 38, 255, 0.03) 0px, rgba(176, 38, 255, 0.03) 10px, transparent 11px, transparent 20px);
            background-size: 50px 50px, 300px 300px;
            animation: moveTopography 60s infinite linear; opacity: 0.8;
        }
        @keyframes moveTopography { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(150px, 150px) rotate(5deg); } }

        .glass { background: rgba(15, 15, 15, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(176, 38, 255, 0.15); border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

        /* GİRİŞ EKRANI */
        .floating-menu { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 90%; max-width: 380px; z-index: 10; padding: 45px 35px; }
        .logo-container { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0; margin-bottom: 35px; }
        .crt-tv { width: 110px; height: auto; filter: drop-shadow(0 0 10px rgba(176, 38, 255, 0.3)); z-index: 2; }
        .tv-text { text-shadow: 0 0 8px #b026ff; letter-spacing: 2px; }
        .part-text { font-size: 46px; font-weight: 800; letter-spacing: 12px; color: #fff; text-shadow: 0 0 20px #b026ff; margin-top: -6px; line-height: 1; }

        .actions { display: flex; flex-direction: column; width: 100%; gap: 18px; }
        button, input { width: 100%; padding: 16px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; background: rgba(255, 255, 255, 0.03); outline: none; font-size: 13px; font-weight: 600; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1.5px; color: #fff; }
        input { text-align: center; }
        input:focus { border-color: #b026ff; background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 15px rgba(176, 38, 255, 0.3); }
        button { cursor: pointer; }
        button:hover { background: rgba(176, 38, 255, 0.15); box-shadow: 0 5px 20px rgba(176, 38, 255, 0.3); transform: translateY(-2px); border-color: rgba(176, 38, 255, 0.5); }
        .join-zone { display: flex; flex-direction: column; width: 100%; gap: 15px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.05); }
        .watermark { text-align: center; font-size: 11px; margin-top: 15px; color: rgba(255,255,255,0.2); letter-spacing: 3px; }

        /* UYGULAMA EKRANI */
        .app-container { display: flex; width: 95vw; height: 92vh; max-width: 1600px; gap: 20px; z-index: 10; }
        
        .main-content { flex: 1; display: flex; flex-direction: column; gap: 15px; min-width: 0; }
        video { width: 100%; flex: 1; object-fit: contain; background: rgba(0,0,0,0.8); border-radius: 12px; border: 1px solid rgba(176, 38, 255, 0.15); box-shadow: 0 20px 50px rgba(0,0,0,0.9); outline: none; }
        
        .controls-bar { display: flex; gap: 15px; padding: 15px; align-items: center; }
        #start-share-btn { flex: 1; }
        #stop-share-btn { flex: 1; border-color: rgba(255, 140, 0, 0.5); color: #ffa500; }
        #stop-share-btn:hover { background: rgba(255, 140, 0, 0.1); border-color: #ffa500; }
        
        .danger-btn { border-color: rgba(255, 50, 50, 0.4); color: #ff4d4d; width: 180px; }
        .danger-btn:hover { background: rgba(255, 50, 50, 0.1); border-color: #ff4d4d; }
        .icon-btn { width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border-radius: 8px; border-color: rgba(176, 38, 255, 0.5); color: #b026ff; background: rgba(176, 38, 255, 0.05); transition: 0.3s; }
        .icon-btn:hover { background: rgba(176, 38, 255, 0.2); }

        .sidebar { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; padding: 20px; gap: 20px; }
        
        .room-info { text-align: center; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .room-info span { font-size: 13px; color: #aaa; letter-spacing: 2px;}
        .room-info b { font-size: 22px; color: #fff; text-shadow: 0 0 15px #b026ff; letter-spacing: 4px; }
        
        /* Kopyalama İkonu İçin Flex Düzeni */
        .code-wrapper { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 5px; }

        .users-section { flex: 0.3; overflow-y: auto; min-height: 100px; }
        .users-section h3, .chat-section h3 { font-size: 12px; color: #b026ff; letter-spacing: 2px; margin-bottom: 10px; border-left: 3px solid #b026ff; padding-left: 8px;}
        #user-list { list-style: none; }
        #user-list li { font-size: 13px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center;}
        #user-list li::before { content: ""; display: inline-block; width: 8px; height: 8px; background: #00ff88; border-radius: 50%; margin-right: 10px; box-shadow: 0 0 8px #00ff88;}

        .chat-section { flex: 0.7; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; display: flex; flex-direction: column; gap: 8px;}
        .msg { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; font-size: 13px; line-height: 1.4; word-break: break-word;}
        .msg b { color: #b026ff; font-weight: 600; margin-right: 5px; font-size: 12px;}
        
        .chat-input-area { display: flex; gap: 10px; }
        #chat-input { text-transform: none; text-align: left; letter-spacing: 0; min-width: 0; }
        #send-btn { width: 50px; flex-shrink: 0; font-size: 18px; padding: 0; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(176, 38, 255, 0.4); border-radius: 10px; }

        @media (max-width: 768px) {
            body { align-items: flex-start; overflow-y: auto; }
            .app-container { flex-direction: column; width: 100vw; height: auto; min-height: 100vh; padding: 10px; gap: 15px; }
            .sidebar { width: 100%; flex: none; height: 500px; }
            video { min-height: 250px; max-height: 35vh; }
            .controls-bar { flex-wrap: wrap; justify-content: space-between; padding: 12px; }
            #start-share-btn, #stop-share-btn { width: 100%; flex: none; margin-bottom: 5px; }
            .danger-btn { flex: 1; width: auto; }
            .icon-btn { width: 48px; height: 48px; }
            .floating-menu { margin-top: 20px; padding: 30px 20px; }
            .part-text { font-size: 38px; letter-spacing: 8px; }
        }
    </style>
</head>
<body>
    <div class="background"><div class="contour-lines"></div></div>

    <div class="floating-menu glass" id="entry-screen">
        <div class="logo-container">
            <svg class="crt-tv" viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
                <rect x="5" y="15" width="90" height="60" rx="8" fill="#0a0a0a" stroke="#b026ff" stroke-width="2"/>
                <rect x="12" y="22" width="65" height="46" rx="4" fill="#000" stroke="#b026ff" stroke-width="1"/>
                <line x1="50" y1="15" x2="35" y2="2" stroke="#b026ff" stroke-width="2" stroke-linecap="round"/>
                <line x1="50" y1="15" x2="70" y2="5" stroke="#b026ff" stroke-width="2" stroke-linecap="round"/>
                <circle cx="50" cy="15" r="2" fill="#b026ff"/>
                <circle cx="87" cy="32" r="3" fill="#b026ff"/>
                <circle cx="87" cy="45" r="3" fill="#b026ff"/>
                <line x1="83" y1="58" x2="91" y2="58" stroke="#b026ff" stroke-width="1.5"/>
                <line x1="83" y1="62" x2="91" y2="62" stroke="#b026ff" stroke-width="1.5"/>
                <text x="44.5" y="49" font-family="'Poppins', sans-serif" font-size="11" font-weight="800" fill="#fff" text-anchor="middle" class="tv-text">WATCH</text>
            </svg>
            <h1 class="part-text">PAR-T</h1>
        </div>
        
        <div class="actions">
            <input type="text" id="username-input" placeholder="İsminiz (Zorunlu)" autocomplete="off">
            <button id="create-room-btn">YENİ ODA KUR</button>
            <div class="join-zone">
                <input type="text" id="room-input" placeholder="Oda Kodu (Örn: X7A9)" maxlength="4" autocomplete="off">
                <button id="join-room-btn">ODAYA KATIL</button>
            </div>
            <div class="watermark">made by mirai</div>
        </div>
    </div>

    <div class="app-container" id="app-screen" style="display: none;">
        <div class="main-content">
            <video id="remote-video" autoplay playsinline controls></video>
            
            <div class="controls-bar glass">
                <button id="start-share-btn">EKRANI PAYLAŞ</button>
                <button id="stop-share-btn" style="display: none;">YAYINI DURDUR</button>
                
                <button id="refresh-btn" class="icon-btn" title="Bağlantıyı Tetikle / Yenile">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
                
                <button id="leave-btn" class="danger-btn">ODADAN AYRIL</button>
            </div>
        </div>

        <div class="sidebar glass">
            <div class="room-info">
                <span>ODA KODU</span>
                <div class="code-wrapper">
                    <b id="generated-code">----</b>
                    <button id="copy-link-btn" class="icon-btn" style="width: 32px; height: 32px; border-radius: 6px;" title="Davet Linkini Kopyala">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </div>
            <div class="users-section">
                <h3>KİŞİLER</h3>
                <ul id="user-list"></ul>
            </div>
            <div class="chat-section">
                <h3>SOHBET</h3>
                <div class="messages" id="chat-messages">
                    <div class="msg" style="opacity:0.5; text-align:center;">Sohbet Başladı</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Mesaj yaz..." autocomplete="off">
                    <button id="send-btn">></button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=7.0"></script>
</body>
</html>
